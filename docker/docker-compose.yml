# =============================================================================
# Hologram AI Agent MCP VS — Local Docker Compose
# =============================================================================
#
# Runs ONLY dependent infrastructure services (Redis, PostgreSQL).
# The VS Agent is deployed separately by scripts/setup.sh (with ngrok).
# The chatbot itself runs natively via scripts/start.sh (for hot-reload).
#
# Usage:
#   docker compose -f docker/docker-compose.yml up -d
#
# =============================================================================

services:
  redis:
    image: redis/redis-stack-server:latest
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hologram}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hologram}
      POSTGRES_DB: ${POSTGRES_DB_NAME:-hologram-agent}
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

volumes:
  redis-data:
  postgres-data:
  minio-data:
